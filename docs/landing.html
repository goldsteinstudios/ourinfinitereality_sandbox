<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Infinite Reality</title>
    <meta name="description" content="What if reality really is infinite? A pattern discovered across physics, biology, ancient Chinese, and the shape of good conversations.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1e;
            color: #e8e4d9;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* Opening symbol */
        #opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        #opening.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #symbol {
            position: relative;
            width: 200px;
            height: 200px;
        }

        #symbol-circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #c9a959;
            border-radius: 50%;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 0.5s;
        }

        #symbol-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #c9a959;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: fadeIn 1s ease forwards 0s;
            box-shadow: 0 0 20px rgba(201, 169, 89, 0.4);
        }

        #symbol-orbiter {
            position: absolute;
            top: 0;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #e8e4d9;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: fadeIn 1s ease forwards 1.5s, orbit 12s linear infinite 2s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes orbit {
            from { transform: translate(-50%, -50%) rotate(0deg) translateX(100px) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg) translateX(100px) rotate(-360deg); }
        }

        #hint {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: #555;
            opacity: 0;
            animation: fadeIn 1s ease forwards 3s;
        }

        /* Sphere container */
        #sphere-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #sphere-container.visible {
            opacity: 1;
        }

        /* UI Overlay */
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease 0.5s;
        }

        #ui-overlay.visible {
            opacity: 1;
        }

        /* Node labels that appear on hover */
        .node-label {
            position: absolute;
            padding: 0.4rem 0.8rem;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid #333;
            color: #c9a959;
            font-size: 0.9rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .node-label.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Info panel */
        #info-panel {
            position: absolute;
            top: 2rem;
            right: 2rem;
            max-width: 320px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #333;
            padding: 1.25rem;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        #info-panel.visible {
            opacity: 1;
            transform: translateX(0);
        }

        #info-panel h3 {
            color: #c9a959;
            font-size: 1.1rem;
            margin-bottom: 0.6rem;
            font-weight: normal;
            line-height: 1.3;
        }

        #info-panel p {
            color: #999;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        #info-panel .meta {
            font-size: 0.75rem;
            color: #555;
            border-top: 1px solid #222;
            padding-top: 0.6rem;
            margin-top: 0.6rem;
            display: flex;
            gap: 1rem;
        }

        #info-panel .confidence {
            padding: 0.15rem 0.4rem;
            border-radius: 2px;
            font-size: 0.7rem;
        }

        .confidence.high { background: rgba(100, 180, 100, 0.2); color: #8a8; }
        .confidence.medium { background: rgba(180, 180, 100, 0.2); color: #aa8; }
        .confidence.low { background: rgba(180, 140, 100, 0.2); color: #a96; }

        #info-panel .close-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.6rem;
            background: none;
            border: none;
            color: #444;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.2rem;
        }

        #info-panel .close-btn:hover {
            color: #c9a959;
        }

        .confidence.ai-assisted { background: rgba(180, 140, 100, 0.2); color: #c96; }
        .confidence.extrapolation { background: rgba(180, 140, 100, 0.2); color: #a96; }

        #info-panel .link-btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.3rem 0.6rem;
            background: rgba(201, 169, 89, 0.1);
            border: 1px solid #c9a959;
            color: #c9a959;
            font-size: 0.8rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #info-panel .link-btn:hover {
            background: rgba(201, 169, 89, 0.2);
        }

        /* Breadcrumb */
        #breadcrumb {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 0.85rem;
            color: #555;
            pointer-events: auto;
        }

        #breadcrumb span {
            cursor: pointer;
            transition: color 0.3s ease;
        }

        #breadcrumb span:hover {
            color: #c9a959;
        }

        #breadcrumb .sep {
            margin: 0 0.4rem;
            color: #333;
        }

        /* Navigation hint */
        #nav-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #666;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 1.5s;
        }

        /* Return button */
        #return-btn {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            padding: 0.4rem 0.9rem;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            color: #555;
            font-family: 'Georgia', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: auto;
            opacity: 0;
        }

        #return-btn.visible {
            opacity: 1;
        }

        #return-btn:hover {
            border-color: #c9a959;
            color: #c9a959;
        }
    </style>
</head>
<body>
    <!-- Opening Symbol -->
    <div id="opening">
        <div id="symbol">
            <div id="symbol-center"></div>
            <div id="symbol-circle"></div>
            <div id="symbol-orbiter"></div>
        </div>
        <div id="hint">click to enter</div>
    </div>

    <!-- Sphere -->
    <div id="sphere-container"></div>

    <!-- UI -->
    <div id="ui-overlay">
        <div id="breadcrumb">
            <span data-sphere="root">⊙</span>
        </div>

        <div id="info-panel">
            <button class="close-btn">×</button>
            <h3 id="info-title"></h3>
            <p id="info-content"></p>
            <a id="info-link" class="link-btn" style="display: none;">read more →</a>
            <div class="meta">
                <span class="confidence" id="info-confidence"></span>
                <span id="info-effort"></span>
            </div>
        </div>

        <div id="nav-hint">drag · scroll · click</div>

        <button id="return-btn">↩ return</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    // ═══════════════════════════════════════════════════════════════
    // DATA - The sphere model
    // ═══════════════════════════════════════════════════════════════

        {

    // Nested spheres - domains you can dive into
    // Node schema per spec Section 5.1:
    // - source: 'direct' | 'synthesis' | 'ai-assisted' | 'extrapolation'
    // - conf: 0-1 confidence
    // - eff: 1-5 effort level
    const nested = {
        ddj: {
            name: "Dao De Jing",
            nodes: [
                { id: "ch1", title: "Chapter 1: Coordinate System", θ: 0, φ: 0.5, r: 0.3, conf: 0.95, eff: 2, source: 'direct',
                  text: "道可道非常道 — The pattern that can be patterned is not the constant pattern. Establishes the 可/常 and 無/有 axes.",
                  link: "translations/chapters/chapter01.html" },
                { id: "ch11", title: "Chapter 11: Bounded Emptiness", θ: 0.12, φ: 0.45, r: 0.3, conf: 0.98, eff: 1, source: 'direct',
                  text: "有之以為利，無之以為用 — Form constrains, void functions. The wheel hub, the clay pot, the room's walls.",
                  link: "translations/chapters/chapter11.html" },
                { id: "ch25", title: "Chapter 25: Rosetta Stone", θ: 0.24, φ: 0.55, r: 0.3, conf: 0.95, eff: 2, source: 'direct',
                  text: "大→逝→遠→反 — The recursion formula. Extension, departure, distance, return.",
                  link: "translations/chapters/chapter25.html" },
                { id: "ch40", title: "Chapter 40: Return Is Movement", θ: 0.36, φ: 0.5, r: 0.3, conf: 0.95, eff: 1, source: 'direct',
                  text: "反者道之動 — Reversal is how pattern moves. The oscillation that keeps everything alive.",
                  link: "translations/chapters/chapter40.html" },
                { id: "lexicon", title: "Characters as Equations", θ: 0.6, φ: 0.5, r: 0.5, conf: 0.85, eff: 3, source: 'synthesis',
                  text: "Each character = f(substrate, operator) → result. 利 = 禾 + 刂 = grain + blade = the scythe arc.",
                  link: "translations/lexicon/00_introduction.html" },
                { id: "guodian", title: "Bamboo Archaeology", θ: 0.72, φ: 0.55, r: 0.55, conf: 0.8, eff: 4, source: 'synthesis',
                  text: "~300 BCE manuscripts. 恆→常 drift. Original organization by function, not number.",
                  link: "translations/archaeology/guodian_bundle_a.html" },
                { id: "hydraulic", title: "治: Water Through Platforms", θ: 0.84, φ: 0.45, r: 0.5, conf: 0.85, eff: 3, source: 'synthesis',
                  text: "Governance IS water management. 氵+ 台 = channeling through infrastructure.",
                  link: "framework/governance_hydraulic.html" }
            ]
        },
        math: {
            name: "Mathematics",
            nodes: [
                { id: "euler", title: "e^(iπ) + 1 = 0", θ: 0, φ: 0.5, r: 0.3, conf: 0.9, eff: 3, source: 'synthesis',
                  text: "All five constants meeting at nothing. e = continuous growth, i = orthogonal turn, π = closure, 1 = identity, 0 = origin.",
                  link: "essays/euler_tao.html" },
                { id: "operators", title: "The Five Operators", θ: 0.33, φ: 0.5, r: 0.4, conf: 0.85, eff: 3, source: 'synthesis',
                  text: "i = rotation, π = closure, e = scale recursion, 1 = local unit, 0 = paradox center. Why exactly these five.",
                  link: "framework/geometry.html" },
                { id: "rsm", title: "The Recursion Kernel", θ: 0.66, φ: 0.5, r: 0.35, conf: 0.95, eff: 2, source: 'synthesis',
                  text: "P₀ → O₁ → G₁ → P₁ → O₂. Paradox promotes to origin, induces gradient, closes to surface, promotes again.",
                  link: "framework/recursive_structural_model.html" }
            ]
        },
        physics: {
            name: "Physics",
            nodes: [
                { id: "energy", title: "Energy IS Rotation", θ: 0, φ: 0.5, r: 0.35, conf: 0.75, eff: 4, source: 'ai-assisted',
                  text: "Energy = rotation rate. Conservation = rotation must complete. E=mc² encodes rotation-mass equivalence.",
                  link: "framework/energy_conservation_synthesis.html" },
                { id: "time", title: "Time: Rotation Succeeding", θ: 0.25, φ: 0.5, r: 0.35, conf: 0.75, eff: 4, source: 'ai-assisted',
                  text: "Time isn't a dimension — it's rotation itself. Experience = the path traced as rotation succeeds.",
                  link: "framework/time_recursion_synthesis.html" },
                { id: "quantum", title: "Quantum: Rotation Unresolved", θ: 0.5, φ: 0.5, r: 0.4, conf: 0.7, eff: 4, source: 'ai-assisted',
                  text: "Superposition = all possible rotations held. Measurement = forcing one rotation to complete.",
                  link: "framework/quantum_measurement_synthesis.html" },
                { id: "blackhole", title: "Black Holes: Rotation Failing", θ: 0.75, φ: 0.5, r: 0.45, conf: 0.75, eff: 4, source: 'ai-assisted',
                  text: "Event horizon = where circulation fails to complete. Information lives at the boundary, not the center.",
                  link: "framework/black_hole_synthesis.html" }
            ]
        },
        bio: {
            name: "Biology",
            nodes: [
                { id: "tree", title: "Hollow Pith, Standing Tree", θ: 0, φ: 0.5, r: 0.3, conf: 0.95, eff: 2, source: 'direct',
                  text: "The pith can rot away; the tree stands. Growth rings around a hollow center. Chapter 11 written in wood.",
                  link: "framework/plant_axioms.html" },
                { id: "cambium", title: "Life at the Boundary", θ: 0.33, φ: 0.5, r: 0.4, conf: 0.85, eff: 3, source: 'synthesis',
                  text: "The cambium has zero thickness but is the only living layer. The tree IS the boundary between inside and outside.",
                  link: "framework/plant_axioms.html" },
                { id: "axioms", title: "Ten Axioms of Plant Growth", θ: 0.66, φ: 0.5, r: 0.5, conf: 0.8, eff: 4, source: 'synthesis',
                  text: "Growth at surfaces. Branch angles cluster perpendicular. Fractal dimension ≈ 2. Testable predictions.",
                  link: "framework/plant_axioms.html" }
            ]
        },
        rsm: {
            name: "RSM",
            nodes: [
                { id: "core", title: "Core Grammar", θ: 0, φ: 0.5, r: 0.3, conf: 0.95, eff: 2, source: 'synthesis',
                  text: "P₀ → O₁ → G₁ → P₁ → O₂. The minimum sequence that generates stable recursive structure.",
                  link: "framework/recursive_structural_model.html" },
                { id: "sphere", title: "The Paradox Sphere", θ: 0.125, φ: 0.45, r: 0.35, conf: 0.95, eff: 2, source: 'synthesis',
                  text: "Paradoxes aren't contradictions — they're poles on a sphere. Walk from one to the other without contradiction.",
                  link: "framework/geometry.html" },
                { id: "hollow", title: "The Hollow Center", θ: 0.25, φ: 0.55, r: 0.3, conf: 0.95, eff: 2, source: 'synthesis',
                  text: "The center is hollow because if it were solid, it would need a foundation. And there are no foundations.",
                  link: "framework/geometry.html" },
                { id: "guardrails", title: "Six Guardrails", θ: 0.375, φ: 0.5, r: 0.4, conf: 0.9, eff: 2, source: 'synthesis',
                  text: "G1: No privileged frame. G2: Preserve paradox. G3: Cross-domain. G4: Scale humility. G5: Invitation > assertion. G6: Describe, don't prescribe.",
                  link: "framework/falsification.html" },
                { id: "ke-chang-analysis", title: "可/常 Scale Recursion", θ: 0.5, φ: 0.45, r: 0.35, conf: 0.9, eff: 2, source: 'synthesis',
                  text: "Every 可 (expressible) is a 常 (invariant) at its own level. Frame-relativity all the way up and down.",
                  link: "framework/chapter25_rosetta_stone.html" },
                { id: "why-three", title: "Why Three Dimensions", θ: 0.625, φ: 0.55, r: 0.4, conf: 0.85, eff: 3, source: 'extrapolation',
                  text: "Three dimensions are the minimum needed for stable circulation. Not arbitrary — structurally necessary.",
                  link: "framework/geometry.html" },
                { id: "parallels", title: "18 Frameworks, One Pattern", θ: 0.75, φ: 0.5, r: 0.5, conf: 0.75, eff: 4, source: 'ai-assisted',
                  text: "Wheeler, Bohm, Rovelli, Hofstadter, Varela... Same structural pattern, different vocabularies.",
                  link: "framework/academic_parallels.html" },
                { id: "falsification", title: "What Would Prove This Wrong", θ: 0.875, φ: 0.45, r: 0.45, conf: 0.9, eff: 2, source: 'direct',
                  text: "Testable claims. Structural inconsistency or empirical failure would falsify this. Not disagreement.",
                  link: "framework/falsification.html" }
            ]
        }
    };

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════

    let currentSphere = 'root';
    let path = ['root'];
    let scene, camera, renderer;
    let sphereGroup, nodeObjs = [];
    let hoveredNode = null;
    let isDragging = false;
    let lastMouse = { x: 0, y: 0 };

    // ═══════════════════════════════════════════════════════════════
    // THREE.JS SETUP
    // ═══════════════════════════════════════════════════════════════

    function init() {
        const container = document.getElementById('sphere-container');

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3.2;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x1a1a1e);
        container.appendChild(renderer.domElement);

        // Group for rotation
        sphereGroup = new THREE.Group();
        scene.add(sphereGroup);

        // Wireframe sphere - more visible
        const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
        const sphereMat = new THREE.MeshBasicMaterial({
            color: 0x555566,
            wireframe: true,
            transparent: true,
            opacity: 0.25
        });
        sphereGroup.add(new THREE.Mesh(sphereGeo, sphereMat));

        // Center glow - the unnamed void
        const glowGeo = new THREE.SphereGeometry(0.06, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({ color: 0xc9a959, transparent: true, opacity: 0.8 });
        const centerGlow = new THREE.Mesh(glowGeo, glowMat);
        sphereGroup.add(centerGlow);

        const haloGeo = new THREE.SphereGeometry(0.15, 32, 32);
        const haloMat = new THREE.MeshBasicMaterial({ color: 0xc9a959, transparent: true, opacity: 0.15 });
        sphereGroup.add(new THREE.Mesh(haloGeo, haloMat));

        // Create nodes
        createNodes(rootNodes, true);

        // Events
        renderer.domElement.addEventListener('mousedown', onMouseDown);
        renderer.domElement.addEventListener('mousemove', onMouseMove);
        renderer.domElement.addEventListener('mouseup', () => isDragging = false);
        renderer.domElement.addEventListener('mouseleave', () => isDragging = false);
        renderer.domElement.addEventListener('wheel', onWheel);
        renderer.domElement.addEventListener('click', onClick);
        window.addEventListener('resize', onResize);

        // Touch support
        renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
        renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
        renderer.domElement.addEventListener('touchend', onTouchEnd);

        animate();
    }

    function createNodes(nodes, isRoot) {
        // Clear old
        nodeObjs.forEach(o => sphereGroup.remove(o.mesh));
        nodeObjs = [];

        nodes.forEach(n => {
            const r = n.r || 1;
            const theta = n.θ * Math.PI * 2;
            const phi = n.φ * Math.PI;

            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.cos(phi);
            const z = r * Math.sin(phi) * Math.sin(theta);

            const conf = n.conf || 1;
            // Larger, more visible nodes
            const size = isRoot ? 0.10 : (0.05 + conf * 0.05);

            const geo = new THREE.SphereGeometry(size, 24, 24);
            const mat = new THREE.MeshBasicMaterial({
                // Brighter, more saturated colors
                color: new THREE.Color().setHSL(0.12, 0.7, 0.45 + conf * 0.30),
                transparent: true,
                opacity: 0.6 + conf * 0.35
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            sphereGroup.add(mesh);

            nodeObjs.push({ mesh, data: n, isRoot });
        });
    }

    // ═══════════════════════════════════════════════════════════════
    // INPUT HANDLERS
    // ═══════════════════════════════════════════════════════════════

    function onMouseDown(e) {
        isDragging = true;
        lastMouse = { x: e.clientX, y: e.clientY };
    }

    function onMouseMove(e) {
        if (isDragging) {
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            sphereGroup.rotation.y += dx * 0.005;
            sphereGroup.rotation.x += dy * 0.005;
            lastMouse = { x: e.clientX, y: e.clientY };
        }

        // Hover detection
        const hit = raycast(e);
        if (hit) {
            if (hoveredNode !== hit.data) {
                hoveredNode = hit.data;
                showLabel(hit, e);
                renderer.domElement.style.cursor = 'pointer';
            }
        } else {
            hoveredNode = null;
            hideLabel();
            renderer.domElement.style.cursor = isDragging ? 'grabbing' : 'grab';
        }
    }

    let touchStart = null;
    function onTouchStart(e) {
        if (e.touches.length === 1) {
            e.preventDefault();
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            isDragging = true;
            lastMouse = touchStart;
        }
    }

    function onTouchMove(e) {
        if (e.touches.length === 1 && isDragging) {
            e.preventDefault();
            const dx = e.touches[0].clientX - lastMouse.x;
            const dy = e.touches[0].clientY - lastMouse.y;
            sphereGroup.rotation.y += dx * 0.005;
            sphereGroup.rotation.x += dy * 0.005;
            lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
    }

    function onTouchEnd(e) {
        if (touchStart && e.changedTouches.length === 1) {
            const dx = Math.abs(e.changedTouches[0].clientX - touchStart.x);
            const dy = Math.abs(e.changedTouches[0].clientY - touchStart.y);
            if (dx < 10 && dy < 10) {
                // It was a tap, not a drag
                const hit = raycastTouch(e.changedTouches[0]);
                if (hit) handleNodeClick(hit);
            }
        }
        isDragging = false;
        touchStart = null;
    }

    function onWheel(e) {
        camera.position.z += e.deltaY * 0.002;
        camera.position.z = Math.max(1.8, Math.min(5, camera.position.z));
    }

    function onClick(e) {
        const hit = raycast(e);
        if (hit) handleNodeClick(hit);
    }

    function handleNodeClick(hit) {
        if (hit.isRoot && hit.data.to && nested[hit.data.to]) {
            enterSphere(hit.data.to);
        } else {
            showInfo(hit.data);
        }
    }

    function raycast(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(
            ((e.clientX - rect.left) / rect.width) * 2 - 1,
            -((e.clientY - rect.top) / rect.height) * 2 + 1
        );
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(nodeObjs.map(o => o.mesh));
        if (hits.length) {
            return nodeObjs.find(o => o.mesh === hits[0].object);
        }
        return null;
    }

    function raycastTouch(touch) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(
            ((touch.clientX - rect.left) / rect.width) * 2 - 1,
            -((touch.clientY - rect.top) / rect.height) * 2 + 1
        );
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(nodeObjs.map(o => o.mesh));
        if (hits.length) {
            return nodeObjs.find(o => o.mesh === hits[0].object);
        }
        return null;
    }

    // ═══════════════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════════════

    function enterSphere(id) {
        currentSphere = id;
        path.push(id);
        createNodes(nested[id].nodes, false);
        updateBreadcrumb();
        document.getElementById('return-btn').classList.add('visible');
        updateURL();
    }

    function exitTo(id) {
        const idx = path.indexOf(id);
        if (idx >= 0) {
            path = path.slice(0, idx + 1);
            currentSphere = id;
            if (id === 'root') {
                createNodes(rootNodes, true);
                document.getElementById('return-btn').classList.remove('visible');
            } else {
                createNodes(nested[id].nodes, false);
            }
            updateBreadcrumb();
            hideInfo();
            updateURL();
        }
    }

    function updateBreadcrumb() {
        const el = document.getElementById('breadcrumb');
        el.innerHTML = path.map((p, i) => {
            const name = p === 'root' ? '⊙' : (nested[p]?.name || p);
            return `<span data-sphere="${p}">${name}</span>` + (i < path.length - 1 ? '<span class="sep">›</span>' : '');
        }).join('');
        el.querySelectorAll('span[data-sphere]').forEach(s => {
            s.onclick = () => exitTo(s.dataset.sphere);
        });
    }

    // ═══════════════════════════════════════════════════════════════
    // UI UPDATES
    // ═══════════════════════════════════════════════════════════════

    function showLabel(hit, e) {
        let labelEl = document.querySelector('.node-label');
        if (!labelEl) {
            labelEl = document.createElement('div');
            labelEl.className = 'node-label';
            document.getElementById('ui-overlay').appendChild(labelEl);
        }
        const text = hit.isRoot ? hit.data.label : hit.data.title;
        labelEl.textContent = text;
        labelEl.style.left = (e.clientX + 15) + 'px';
        labelEl.style.top = (e.clientY - 10) + 'px';
        labelEl.classList.add('visible');
    }

    function hideLabel() {
        const label = document.querySelector('.node-label');
        if (label) label.classList.remove('visible');
    }

    function showInfo(data) {
        const panel = document.getElementById('info-panel');
        document.getElementById('info-title').textContent = data.title || data.id;
        document.getElementById('info-content').textContent = data.text || '';

        const linkEl = document.getElementById('info-link');
        if (data.link) {
            linkEl.href = data.link;
            linkEl.style.display = 'inline-block';
        } else {
            linkEl.style.display = 'none';
        }

        // Source-based confidence labels per spec Section 7.2
        const source = data.source || 'synthesis';
        const confEl = document.getElementById('info-confidence');
        const sourceLabels = {
            'direct': 'verified',
            'synthesis': 'synthesized',
            'ai-assisted': 'ai-assisted',
            'extrapolation': 'provisional'
        };
        const sourceClasses = {
            'direct': 'high',
            'synthesis': 'medium',
            'ai-assisted': 'ai-assisted',
            'extrapolation': 'extrapolation'
        };
        confEl.textContent = sourceLabels[source] || 'synthesized';
        confEl.className = 'confidence ' + (sourceClasses[source] || 'medium');

        const eff = data.eff || 1;
        const effLabels = ['', 'minimal effort', 'low effort', 'medium effort', 'substantial effort', 'deep dive'];
        document.getElementById('info-effort').textContent = effLabels[eff];

        panel.classList.add('visible');
        updateURL();
    }

    function hideInfo() {
        document.getElementById('info-panel').classList.remove('visible');
    }

    // URL state management
    function updateURL() {
        const pathStr = path.length > 1 ? path.slice(1).join('/') : '';
        const hash = pathStr ? `#/${pathStr}` : '';
        history.replaceState(null, '', hash || window.location.pathname);
    }

    function parseURL() {
        const hash = window.location.hash;
        if (!hash || hash === '#/') return { sphere: 'root', path: ['root'] };

        const pathPart = hash.slice(2);
        const pathSegments = pathPart ? pathPart.split('/').filter(Boolean) : [];

        return {
            sphere: pathSegments[pathSegments.length - 1] || 'root',
            path: ['root', ...pathSegments]
        };
    }

    function restoreFromURL() {
        const state = parseURL();

        // Navigate to sphere if not root
        if (state.sphere !== 'root' && nested[state.sphere]) {
            path = state.path;
            currentSphere = state.sphere;
            createNodes(nested[state.sphere].nodes, false);
            updateBreadcrumb();
            document.getElementById('return-btn').classList.add('visible');
        }
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    // ═══════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════

    document.getElementById('opening').onclick = () => {
        document.getElementById('opening').classList.add('hidden');
        document.getElementById('sphere-container').classList.add('visible');
        document.getElementById('ui-overlay').classList.add('visible');
        init();
        // Restore state from URL after init
        setTimeout(restoreFromURL, 100);
    };

    document.querySelector('#info-panel .close-btn').onclick = hideInfo;
    document.getElementById('return-btn').onclick = () => exitTo('root');

    // Handle browser back/forward
    window.addEventListener('popstate', () => {
        if (scene) restoreFromURL();
    });
    </script>
</body>
</html>
