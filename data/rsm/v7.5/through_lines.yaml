# RSM v7.5 Through-Lines
# Extracted from parallax_v7.5.md
# Each through-line names the shared structural invariant, then each register's pointing

through_lines:
  - id: 1
    name: "No terminal resolution"
    invariant: "Nothing bottoms out as final absence; nothing tops out as final saturation"
    math: "0ₙ ≠ |0|; 1ₙ ≠ |1|; positions are limits, not integers"
    ddj: "常道 ≠ 可道; 常無/常有 as the two excluded faces"
    physics: "The vacuum is not absolute nothing; Planck and cosmological limits are frame boundaries, not terminal states"

  - id: 2
    name: "Center required but unoccupiable"
    invariant: "Every frame needs a center of structural symmetry; that center cannot be occupied without collapsing the distinction that constitutes the frame"
    math: "Pₙ = Gₙ ∩ Bₙ; Pₙ ∉ Fₙ"
    ddj: "⽞ :: Pₙ; ⾕神不死 :: the inexhaustible forbidden center"
    physics: "Simultaneous conjugate localization, the singularity, the field-axis crossing — each a center the theory gestures toward but cannot inhabit"

  - id: 3
    name: "Recursion generates new coordinate systems"
    invariant: "The center cannot be resolved inside frame n; that structural fact generates a new coordinate system at the parent's forbidden center"
    math: "Pₙ → O₍ₙ₊₁₎, with Gₙ → xAxis₍ₙ₊₁₎ and Bₙ → yAxis₍ₙ₊₁₎; branching, not linear"
    ddj: "⽞牝 :: Pₙ → O₍ₙ₊₁₎; ⼜⽞ :: branching recursion"
    physics: "Regimes nest as branching coordinate systems generated at parent regimes' forbidden centers"
    biology: "Every tree branch is a Pₙ → O₍ₙ₊₁₎ event at a position on the trunk's cambium"

  - id: 4
    name: "Direct crossing forbidden; forced traversal"
    invariant: "The center cannot be crossed; the conserved unit fixes a minimum standoff; spanning the modes under that standoff forces a single connected circular path"
    math: "Standoff radius √1ₙ (inward forbidden); the zero-cost minimizer is the unit circle S¹"
    ddj: "反者道之動 :: orbital return around ⽞"
    physics: "Phase, spin, wave circulation, vortices, toroidal confinement: persistence organized around a center that is not occupied"

  - id: 5
    name: "Two modes require third position"
    invariant: "Two opposed positions require an orthogonal mediator for traversal. +1 → +i → −1: departure → orthogonal apex → opposite"
    math: "The three-position arch as the minimum mediated inversion structure"
    ddj: "⼆⽣三 :: the orthogonal mediator"
    physics: "Phase mediation; virtual intermediate states in transitions"

  - id: 6
    name: "Orthogonality generated, not imported"
    invariant: "The angle between the mode axes is not assumed; it is produced"
    math: "Pₙ unoccupiable → standoff → forced unit circle → i² = −1 by elimination → Q_i = a² + b² → ⟨t_G, t_B⟩ = 0 at Pₙ"
    ddj: "名 :: i — the minimal orthogonal cut required at every obtainable point"
    physics: "Local positive-definite spatial metric and global Lorentzian signature attach to two structurally distinct motions"
    note: "Two algebras: j² = +1 (gradient, Lorentzian), i² = −1 (orbit, Euclidean)"

  - id: 7
    name: "Local accuracy, frame-relative geometry"
    invariant: "Each frame locally recovers usability; locally things are flat enough to measure; across frames the larger structure operates differently"
    math: "Local tangent / global manifold; Gₙ curved with respect to its poles, locally flat from the child's scale"
    ddj: "Each frame is 可道, with its own local accuracy"
    physics: "Local Minkowski / global Lorentzian"

  - id: 8
    name: "Recursion generates coordinate systems, not dimensions"
    invariant: "Each frame locally recovers ℝ³ at its own scale; the child frame is a new coordinate recovery, not a fourth or fifth spatial axis"
    math: "New coordinate recovery; the Lorentz signature X² + Y² + Z² − T² = 1ₙ, not a Euclidean fourth axis"
    ddj: "道⼤ :: extension-without-terminus; each frame its own ℝ³"
    physics: "Regimes do not inflate to ℝ⁴, ℝ⁵; space is orientation, time is traversal"

  - id: 9
    name: "Toroidal persistence under privileged gradients"
    invariant: "When a privileged gradient operates and direct crossing is forbidden, persistent structure organizes around an axis or centerline"
    physics: "Tokamak, magnetosphere, convection cell, vortex ring, accretion disk"
    biology: "Gut (genus-1), tree pith"
    status: candidate

  - id: 10
    name: "Energy as misalignment cost"
    invariant: "Energy reads as the cost of maintaining a state against the operating gradient"
    math: "A cost function of misalignment"
    ddj: "無為 :: aligned persistence; 為 :: effortful correction"
    physics: "Binding, kinetic, potential, zero-point energy"
    status: candidate

  - id: 11
    name: "Parallax is the method"
    invariant: "No single probe sees the whole"
    note: "Math sees the invariant relation; physics sees conservation and curvature; the DDJ sees compressed structural language. The structure appears where independent registers converge."
