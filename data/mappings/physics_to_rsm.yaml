# Physics → RSM Snap Tests
# Each domain should instantiate the recursion kernel: P₀⇔O₁⇔G₁⇔P₁⇔O₂

epistemic_status: |
  These are explorations, not claims. The physics sections apply the
  structural model to physics—not to replace physics, but to see if
  the pattern holds. Treat as hypotheses to test, not conclusions.

core_hypothesis:
  name: "Energy Is Rotation"
  statement: "Energy isn't a substance but a rate of rotation"
  implications:
    - "Conservation = rotation must complete"
    - "E=mc² encodes rotation-mass equivalence"
    - "Quantum measurement = forcing rotation completion"

snap_tests:
  gravity:
    name: "Gravitational Systems"
    P0: "mass-energy potential (pre-distinction)"
    O1: "singular origin (point mass)"
    G1: "spacetime curvature (gravitational field)"
    P1: "shells/horizons (measurable equipotentials)"
    P_to_O: "knots/seeds (new mass formation from field)"
    euler_mapping:
      i: "orthogonal spacetime dimensions"
      π: "orbital closure (Kepler paths)"
      e: "scale recursion (nested orbits)"
    ddj_parallel: "淵兮似萬物之宗 — the abyss seems ancestor of all things"

  quantum:
    name: "Quantum Systems"
    P0: "superposition (unmeasured potential)"
    O1: "wavefunction collapse point"
    G1: "probability amplitude field"
    P1: "measurement outcomes (eigenvalues)"
    P_to_O: "new superposition setup (next measurement frame)"
    euler_mapping:
      i: "phase (rotation in complex plane)"
      π: "interference (half-cycle reversal)"
      e: "amplitude evolution"
    ddj_parallel: "反者道之動 — superposition is reversal held dynamic"

  thermodynamics:
    name: "Thermodynamic Systems"
    P0: "entropy potential"
    O1: "entropy minimum (ordered state)"
    G1: "entropy gradient (heat flow direction)"
    P1: "equilibrium surface (maximum entropy)"
    P_to_O: "fluctuation seeds new order"
    euler_mapping:
      i: "phase transitions"
      π: "Carnot cycle closure"
      e: "Boltzmann distribution"
    ddj_parallel: "萬物並作，吾以觀復 — all things work together, I observe return"

  electromagnetism:
    name: "Electromagnetic Systems"
    P0: "field potential (gauge freedom)"
    O1: "charge (point source)"
    G1: "field gradient (E/B fields)"
    P1: "flux surfaces (equipotentials)"
    P_to_O: "radiation → new charge configuration"
    euler_mapping:
      i: "E⊥B (orthogonal fields)"
      π: "wave oscillation (λ/2)"
      e: "exponential decay/growth"
    ddj_parallel: "沖而用之或不盈 — hollow, use it, never fills"

  black_holes:
    name: "Black Hole Systems"
    P0: "singularity (undefined center)"
    O1: "event horizon (boundary origin)"
    G1: "curvature gradient (Schwarzschild metric)"
    P1: "photon sphere, ISCO, infinity"
    P_to_O: "Hawking radiation (information at boundary)"
    note: "Event horizon = where circulation fails. Information lives at boundary."
    euler_mapping:
      i: "frame dragging (rotation)"
      π: "horizon as closure"
      e: "temperature (Hawking)"
    ddj_parallel: "玄之又玄 — paradox within paradox"

  time:
    name: "Time Structure"
    hypothesis: "Time isn't a dimension—it's rotation succeeding"
    P0: "eternal present (unmeasured)"
    O1: "now (measurement origin)"
    G1: "entropy gradient (arrow of time)"
    P1: "recorded past / predicted future"
    P_to_O: "memory → new now"
    ddj_parallel: "復命曰常 — return to mandate called constant"

conservation_as_closure:
  principle: "Conservation = rotation must complete"
  examples:
    energy: "Cannot be created/destroyed = rotation cannot be interrupted"
    momentum: "Conserved = orbital closure maintained"
    charge: "Conserved = phase cycle complete"
    information: "Conserved (black hole paradox) = boundary preserves rotation"

formalism_connections:
  lagrangian:
    statement: "L = T - V = kinetic - potential"
    rsm_reading: "The difference between rotation in progress and rotation potential"
  hamiltonian:
    statement: "H = T + V = total energy"
    rsm_reading: "Total rotation capacity (kinetic + stored)"
  euler_lagrange:
    statement: "d/dt(∂L/∂q̇) = ∂L/∂q"
    rsm_reading: "Path of least rotation-deviation"
  noether:
    statement: "Symmetry → Conservation law"
    rsm_reading: "Closure symmetry → rotation must complete"
